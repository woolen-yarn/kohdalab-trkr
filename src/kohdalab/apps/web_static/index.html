<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KohdaLab Web UI</title>
    <link rel="stylesheet" href="/assets/web_ui.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <h1>KohdaLab Remote UI</h1>
          <p id="profile-line">Loading...</p>
        </div>
        <div class="top-status">
          <span id="job-pill" class="pill">idle</span>
          <span id="operation-pill" class="pill muted">no operation</span>
        </div>
      </header>

      <main class="shell">
        <aside class="pane left-pane">
          <section class="group">
            <h2>Session</h2>
            <label class="field wide">
              <span>Config path</span>
              <input id="config-path" type="text" />
            </label>
            <div class="button-row">
              <button id="load-config">Load</button>
              <button id="save-config">Save</button>
              <button id="read-live">Read Live</button>
            </div>
            <div class="button-row">
              <button id="connect-all">Connect All</button>
              <button id="disconnect-all">Disconnect All</button>
            </div>
            <details>
              <summary>Config JSON</summary>
              <textarea id="config-json" spellcheck="false"></textarea>
              <button id="save-config-json">Save JSON</button>
            </details>
          </section>

          <section class="group">
            <h2>Devices</h2>
            <div id="device-list" class="device-list"></div>
          </section>

          <section class="group">
            <h2>Motion</h2>
            <div id="axis-panels" class="axis-panels"></div>
          </section>
        </aside>

        <section class="pane center-pane">
          <nav class="tabs" aria-label="Measurement tabs">
            <button class="tab active" data-mode="signal_monitor">Signal Monitor</button>
            <button class="tab" data-mode="trkr">TRKR</button>
            <button class="tab" data-mode="srkr">SRKR</button>
            <button class="tab" data-mode="strkr">STRKR</button>
            <button class="tab" data-mode="srkr_2d">SRKR 2D</button>
          </nav>

          <div class="measurement-grid">
            <section class="group settings-panel">
              <h2 id="settings-title">Signal Monitor</h2>

              <form id="settings-signal_monitor" class="settings-form">
                <label class="field"><span>Interval (s)</span><input id="signal-interval" type="number" step="0.1" /></label>
                <label class="field"><span>Points</span><input id="signal-points" type="number" step="1" /></label>
              </form>

              <form id="settings-trkr" class="settings-form hidden">
                <div class="three">
                  <label class="field"><span>min cor (ps)</span><input id="trkr-min" type="number" step="0.1" /></label>
                  <label class="field"><span>max cor (ps)</span><input id="trkr-max" type="number" step="0.1" /></label>
                  <label class="field"><span>step (ps)</span><input id="trkr-step" type="number" step="0.1" /></label>
                </div>
                <label class="field"><span>wait (s)</span><input id="trkr-wait" type="number" step="0.1" /></label>
                <label class="check"><input id="trkr-return" type="checkbox" /> return to zero</label>
              </form>

              <form id="settings-srkr" class="settings-form hidden">
                <label class="field"><span>axis</span><select id="srkr-axis"><option>x</option><option>y</option></select></label>
                <div class="three">
                  <label class="field"><span>min cor (um)</span><input id="srkr-min" type="number" step="0.1" /></label>
                  <label class="field"><span>max cor (um)</span><input id="srkr-max" type="number" step="0.1" /></label>
                  <label class="field"><span>step (um)</span><input id="srkr-step" type="number" step="0.1" /></label>
                </div>
                <label class="field"><span>wait (s)</span><input id="srkr-wait" type="number" step="0.1" /></label>
                <label class="check"><input id="srkr-return" type="checkbox" /> return to zero</label>
              </form>

              <form id="settings-strkr" class="settings-form hidden">
                <div class="two">
                  <label class="field"><span>fast axis</span><select id="strkr-fast"><option>t</option><option>x</option><option>y</option></select></label>
                  <label class="field"><span>slow axis</span><select id="strkr-slow"><option>x</option><option>t</option><option>y</option></select></label>
                </div>
                <div class="axis-range" data-prefix="strkr" data-axis="t"></div>
                <div class="axis-range" data-prefix="strkr" data-axis="x"></div>
                <div class="axis-range" data-prefix="strkr" data-axis="y"></div>
                <label class="field"><span>wait (s)</span><input id="strkr-wait" type="number" step="0.1" /></label>
                <div class="two checks">
                  <label class="check"><input id="strkr-return-fast" type="checkbox" /> return fast</label>
                  <label class="check"><input id="strkr-return-slow" type="checkbox" /> return slow</label>
                </div>
              </form>

              <form id="settings-srkr_2d" class="settings-form hidden">
                <div class="two">
                  <label class="field"><span>fast axis</span><select id="srkr2d-fast"><option>x</option><option>y</option></select></label>
                  <label class="field"><span>slow axis</span><select id="srkr2d-slow"><option>y</option><option>x</option></select></label>
                </div>
                <div class="axis-range" data-prefix="srkr2d" data-axis="x"></div>
                <div class="axis-range" data-prefix="srkr2d" data-axis="y"></div>
                <label class="field"><span>wait (s)</span><input id="srkr2d-wait" type="number" step="0.1" /></label>
                <div class="two checks">
                  <label class="check"><input id="srkr2d-return-fast" type="checkbox" /> return fast</label>
                  <label class="check"><input id="srkr2d-return-slow" type="checkbox" /> return slow</label>
                </div>
              </form>
            </section>

            <section class="group run-panel">
              <h2>Output</h2>
              <label class="field wide"><span>Directory</span><input id="output-dir" type="text" /></label>
              <label class="field wide"><span>File</span><input id="output-file" type="text" /></label>
              <label class="check"><input id="output-auto" type="checkbox" /> auto suffix</label>
              <h2>Run</h2>
              <div class="button-row">
                <button id="start-run">Start</button>
                <button id="stop-run">Stop</button>
                <button id="save-rows">Save Now</button>
              </div>
              <dl class="run-status">
                <div><dt>Status</dt><dd id="run-status">-</dd></div>
                <div><dt>Point</dt><dd id="run-point">-</dd></div>
                <div><dt>Output</dt><dd id="run-output">-</dd></div>
              </dl>
            </section>
          </div>

          <section class="plot-area">
            <canvas id="plot" width="900" height="320"></canvas>
          </section>

          <section class="table-area">
            <table id="rows-table"></table>
          </section>
        </section>

        <aside class="pane right-pane">
          <section class="group">
            <h2>Snapshot</h2>
            <table id="snapshot-table" class="snapshot"></table>
          </section>
          <section class="group log-group">
            <h2>Log</h2>
            <pre id="log-output"></pre>
          </section>
        </aside>
      </main>
    </div>
    <script src="/assets/web_ui.js"></script>
  </body>
</html>
