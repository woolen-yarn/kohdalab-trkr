<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="800" viewBox="0 0 1180 800" role="img" aria-labelledby="title desc">
  <title id="title">TRKR Measurement Sequence</title>
  <desc id="desc">Sequence diagram for run_trkr: plan corrected delay points, move delay stage, wait, read lock-in, create TRKR rows, optionally return delay stage to zero, and disconnect only owned sessions.</desc>
  <defs><style>.bg{fill:#f7f9fc}.title{font:700 28px Arial,sans-serif;fill:#172033}.sub{font:400 14px Arial,sans-serif;fill:#596579}.head{fill:#172033}.headText{font:700 14px Arial,sans-serif;fill:#fff}.line{stroke:#aeb8c8;stroke-width:2}.arrow{stroke:#2f6f9f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.return{stroke:#8b98aa;stroke-width:1.8;stroke-dasharray:6 5;fill:none;marker-end:url(#arrowSoft)}.note{fill:#fff8e6;stroke:#e6c76f;stroke-width:1.2}.loop{fill:#eef6ff;stroke:#8ab9e8;stroke-width:1.4}.txt{font:400 13px Arial,sans-serif;fill:#172033}.small{font:400 12px Arial,sans-serif;fill:#4e5b6e}.mono{font:400 12px Consolas,monospace;fill:#233044}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2f6f9f"/></marker><marker id="arrowSoft" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8b98aa"/></marker></defs>
  <rect class="bg" width="1180" height="800"/><text class="title" x="42" y="52">TRKR</text><text class="sub" x="42" y="78">Implemented by run_trkr; required devices: lockin.main and delay_stage.t.</text>
  <rect class="head" x="50" y="116" width="145" height="38" rx="6"/><text class="headText" x="78" y="140">Caller / GUI</text><rect class="head" x="245" y="116" width="145" height="38" rx="6"/><text class="headText" x="274" y="140">Measurement</text><rect class="head" x="440" y="116" width="145" height="38" rx="6"/><text class="headText" x="471" y="140">Session</text><rect class="head" x="635" y="116" width="145" height="38" rx="6"/><text class="headText" x="666" y="140">Delay stage</text><rect class="head" x="830" y="116" width="145" height="38" rx="6"/><text class="headText" x="865" y="140">Lock-in</text><rect class="head" x="1025" y="116" width="105" height="38" rx="6"/><text class="headText" x="1047" y="140">CSV</text>
  <line class="line" x1="122" y1="154" x2="122" y2="720"/><line class="line" x1="317" y1="154" x2="317" y2="720"/><line class="line" x1="512" y1="154" x2="512" y2="720"/><line class="line" x1="707" y1="154" x2="707" y2="720"/><line class="line" x1="902" y1="154" x2="902" y2="720"/><line class="line" x1="1077" y1="154" x2="1077" y2="720"/>
  <path class="arrow" d="M122 190H317"/><text class="txt" x="158" y="181">run_trkr(plan)</text><path class="arrow" d="M317 226H512"/><text class="txt" x="352" y="217">reuse/create session</text>
  <rect class="note" x="635" y="194" width="460" height="74" rx="6"/><text class="small" x="657" y="219">trkr_plan pairs corrected targets with actual move points.</text><text class="mono" x="657" y="241">measurement: scan_point = t_zero_ps + target_t_cor_ps</text><text class="mono" x="657" y="259">row: fast_axis=t, target_t_cor_ps, t_cor_ps, t_ps</text>
  <path class="return" d="M317 294H122"/><text class="txt" x="174" y="286">STATUS_RUNNING</text>
  <rect class="loop" x="82" y="328" width="1028" height="254" rx="8"/><text class="txt" x="104" y="354">loop over scan_points / target_points</text>
  <path class="arrow" d="M317 392H512"/><text class="txt" x="347" y="383">move_delay_stage(target, coordinate)</text><path class="arrow" d="M512 424H707"/><text class="txt" x="548" y="415">move hardware</text><path class="return" d="M707 456H512"/><text class="txt" x="558" y="448">Position(t_ps, mm, pulse)</text>
  <path class="return" d="M317 488H122"/><text class="txt" x="184" y="480">STATUS_WAITING</text><text class="small" x="348" y="512">sleep wait_s, interruptible by should_continue</text>
  <path class="return" d="M317 540H122"/><text class="txt" x="164" y="532">STATUS_READING_LOCKIN</text><path class="arrow" d="M317 564H902"/><text class="txt" x="378" y="555">read_lockin_signal()</text><path class="arrow" d="M317 620H1077"/><text class="txt" x="378" y="611">trkr_row(...), append/write/flush, emit on_point</text>
  <path class="arrow" d="M317 654H707"/><text class="txt" x="350" y="645">if return_to_zero and t_zero_ps: move_delay_stage(t_zero_ps, measurement)</text>
  <path class="return" d="M317 694H122"/><text class="txt" x="174" y="686">STATUS_STOPPED</text>
</svg>

