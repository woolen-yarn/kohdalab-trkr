<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="800" viewBox="0 0 1180 800" role="img" aria-labelledby="title desc">
  <title id="title">SRKR Measurement Sequence</title>
  <desc id="desc">Sequence diagram for run_srkr: choose x or y scanner axis, move scanner points, wait, read position and lock-in signal, create SRKR rows, optionally return scanner to zero, and disconnect only owned sessions.</desc>
  <defs><style>.bg{fill:#f7f9fc}.title{font:700 28px Arial,sans-serif;fill:#172033}.sub{font:400 14px Arial,sans-serif;fill:#596579}.head{fill:#172033}.headText{font:700 14px Arial,sans-serif;fill:#fff}.line{stroke:#aeb8c8;stroke-width:2}.arrow{stroke:#2f6f9f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.return{stroke:#8b98aa;stroke-width:1.8;stroke-dasharray:6 5;fill:none;marker-end:url(#arrowSoft)}.note{fill:#fff8e6;stroke:#e6c76f;stroke-width:1.2}.loop{fill:#eef6ff;stroke:#8ab9e8;stroke-width:1.4}.txt{font:400 13px Arial,sans-serif;fill:#172033}.small{font:400 12px Arial,sans-serif;fill:#4e5b6e}.mono{font:400 12px Consolas,monospace;fill:#233044}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2f6f9f"/></marker><marker id="arrowSoft" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8b98aa"/></marker></defs>
  <rect class="bg" width="1180" height="800"/><text class="title" x="42" y="52">SRKR</text><text class="sub" x="42" y="78">Implemented by run_srkr; required devices: lockin.main and active scanner x or y.</text>
  <rect class="head" x="50" y="116" width="145" height="38" rx="6"/><text class="headText" x="78" y="140">Caller / GUI</text><rect class="head" x="245" y="116" width="145" height="38" rx="6"/><text class="headText" x="274" y="140">Measurement</text><rect class="head" x="440" y="116" width="145" height="38" rx="6"/><text class="headText" x="471" y="140">Session</text><rect class="head" x="635" y="116" width="145" height="38" rx="6"/><text class="headText" x="680" y="140">Scanner</text><rect class="head" x="830" y="116" width="145" height="38" rx="6"/><text class="headText" x="865" y="140">Lock-in</text><rect class="head" x="1025" y="116" width="105" height="38" rx="6"/><text class="headText" x="1047" y="140">CSV</text>
  <line class="line" x1="122" y1="154" x2="122" y2="720"/><line class="line" x1="317" y1="154" x2="317" y2="720"/><line class="line" x1="512" y1="154" x2="512" y2="720"/><line class="line" x1="707" y1="154" x2="707" y2="720"/><line class="line" x1="902" y1="154" x2="902" y2="720"/><line class="line" x1="1077" y1="154" x2="1077" y2="720"/>
  <path class="arrow" d="M122 190H317"/><text class="txt" x="158" y="181">run_srkr(plan, axis=x|y)</text><path class="arrow" d="M317 226H512"/><text class="txt" x="352" y="217">validate axis, reuse/create session</text>
  <rect class="note" x="615" y="194" width="500" height="78" rx="6"/><text class="small" x="637" y="219">srkr_plan offsets target_x/y_cor_um by the selected zero in measurement coordinates.</text><text class="mono" x="637" y="241">row: fast_axis=x|y, target_{axis}_cor_um, {axis}_cor_um, {axis}_um</text><text class="mono" x="637" y="259">scanner coordinate: instrument/device aliases normalize to interface</text>
  <path class="return" d="M317 298H122"/><text class="txt" x="174" y="290">STATUS_RUNNING</text>
  <rect class="loop" x="82" y="330" width="1028" height="252" rx="8"/><text class="txt" x="104" y="356">loop over selected scanner scan_points / target_points</text>
  <path class="arrow" d="M317 392H512"/><text class="txt" x="350" y="383">move_scanner(axis, target, coordinate)</text><path class="arrow" d="M512 424H707"/><text class="txt" x="564" y="415">move x or y</text>
  <path class="return" d="M317 466H122"/><text class="txt" x="184" y="458">STATUS_WAITING</text><text class="small" x="348" y="490">sleep wait_s, interruptible by should_continue</text>
  <path class="return" d="M317 520H122"/><text class="txt" x="164" y="512">STATUS_READING_LOCKIN</text><path class="arrow" d="M317 548H512"/><text class="txt" x="356" y="539">read_position()</text><path class="arrow" d="M317 578H902"/><text class="txt" x="356" y="569">read_lockin_signal()</text><path class="arrow" d="M317 622H1077"/><text class="txt" x="356" y="613">srkr_row(...), append/write/flush, emit on_point</text>
  <path class="arrow" d="M317 656H707"/><text class="txt" x="350" y="647">if return_to_zero: move_scanner(axis, axis_zero, measurement)</text>
  <path class="return" d="M317 694H122"/><text class="txt" x="174" y="686">STATUS_STOPPED</text>
</svg>

