<svg xmlns="http://www.w3.org/2000/svg" width="1220" height="840" viewBox="0 0 1220 840" role="img" aria-labelledby="title desc">
  <title id="title">STRKR Measurement Sequence</title>
  <desc id="desc">Sequence diagram for run_strkr via _run_scan2d: combine t with x or y, move slow axis, scan fast axis for every line, read position and lock-in, create scan2d rows, rewind fast axis between lines, optionally return both axes to zero.</desc>
  <defs><style>.bg{fill:#f7f9fc}.title{font:700 28px Arial,sans-serif;fill:#172033}.sub{font:400 14px Arial,sans-serif;fill:#596579}.head{fill:#172033}.headText{font:700 14px Arial,sans-serif;fill:#fff}.line{stroke:#aeb8c8;stroke-width:2}.arrow{stroke:#2f6f9f;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.return{stroke:#8b98aa;stroke-width:1.8;stroke-dasharray:6 5;fill:none;marker-end:url(#arrowSoft)}.note{fill:#fff8e6;stroke:#e6c76f;stroke-width:1.2}.loop{fill:#eef6ff;stroke:#8ab9e8;stroke-width:1.4}.inner{fill:#f2fbf4;stroke:#7ecb8d;stroke-width:1.3}.txt{font:400 13px Arial,sans-serif;fill:#172033}.small{font:400 12px Arial,sans-serif;fill:#4e5b6e}.mono{font:400 12px Consolas,monospace;fill:#233044}</style><marker id="arrow" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2f6f9f"/></marker><marker id="arrowSoft" viewBox="0 0 10 10" refX="8.8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#8b98aa"/></marker></defs>
  <rect class="bg" width="1220" height="840"/><text class="title" x="42" y="52">STRKR</text><text class="sub" x="42" y="78">Implemented by run_strkr using _run_scan2d; required devices: lockin.main, delay_stage.t, and active spatial scanner.</text>
  <rect class="head" x="40" y="116" width="135" height="38" rx="6"/><text class="headText" x="66" y="140">Caller</text><rect class="head" x="215" y="116" width="150" height="38" rx="6"/><text class="headText" x="244" y="140">Measurement</text><rect class="head" x="405" y="116" width="135" height="38" rx="6"/><text class="headText" x="436" y="140">Session</text><rect class="head" x="580" y="116" width="145" height="38" rx="6"/><text class="headText" x="603" y="140">Delay/scanner</text><rect class="head" x="765" y="116" width="130" height="38" rx="6"/><text class="headText" x="800" y="140">Lock-in</text><rect class="head" x="935" y="116" width="120" height="38" rx="6"/><text class="headText" x="959" y="140">Rows/CSV</text>
  <line class="line" x1="107" y1="154" x2="107" y2="760"/><line class="line" x1="290" y1="154" x2="290" y2="760"/><line class="line" x1="472" y1="154" x2="472" y2="760"/><line class="line" x1="652" y1="154" x2="652" y2="760"/><line class="line" x1="830" y1="154" x2="830" y2="760"/><line class="line" x1="995" y1="154" x2="995" y2="760"/>
  <path class="arrow" d="M107 190H290"/><text class="txt" x="135" y="181">run_strkr(plan)</text><path class="arrow" d="M290 224H472"/><text class="txt" x="322" y="215">plan or strkr_plan_from_config</text>
  <rect class="note" x="560" y="188" width="560" height="82" rx="6"/><text class="small" x="582" y="213">STRKR axes must combine t with one spatial axis. Coordinates are corrected measurement coordinates.</text><text class="mono" x="582" y="235">fast_axis/slow_axis: one of t and one of x|y</text><text class="mono" x="582" y="253">row: scan2d_row with targets for both scanned axes</text>
  <path class="return" d="M290 300H107"/><text class="txt" x="154" y="292">STATUS_RUNNING</text>
  <rect class="loop" x="74" y="330" width="1048" height="330" rx="8"/><text class="txt" x="96" y="356">outer loop: each slow_target</text>
  <path class="arrow" d="M290 392H652"/><text class="txt" x="330" y="383">_move_axis(slow_axis, slow_target + zero)</text><path class="return" d="M290 426H107"/><text class="txt" x="144" y="418">STATUS_SLOW_AXIS_READY</text>
  <rect class="inner" x="112" y="452" width="970" height="154" rx="8"/><text class="txt" x="132" y="478">inner loop: each fast_target</text>
  <path class="arrow" d="M290 510H652"/><text class="txt" x="330" y="501">_move_axis(fast_axis, fast_target + zero)</text><path class="return" d="M290 536H107"/><text class="txt" x="156" y="528">STATUS_WAITING</text><path class="return" d="M290 562H107"/><text class="txt" x="136" y="554">STATUS_READING_LOCKIN</text><path class="arrow" d="M290 586H472"/><text class="txt" x="326" y="577">read_position()</text><path class="arrow" d="M290 612H830"/><text class="txt" x="326" y="603">read_lockin_signal()</text><path class="arrow" d="M290 638H995"/><text class="txt" x="326" y="629">scan2d_row(...), append/write/flush, emit on_point</text>
  <path class="arrow" d="M290 690H652"/><text class="txt" x="326" y="681">between slow lines: move fast_axis back to first fast target</text>
  <path class="arrow" d="M290 724H652"/><text class="txt" x="326" y="715">if configured: return fast_axis and slow_axis to corrected zero</text>
  <path class="return" d="M290 758H107"/><text class="txt" x="154" y="750">STATUS_STOPPED</text>
</svg>

